<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Loading Financial Dashboard...</title>
  <meta http-equiv="refresh" content="3; url=http://localhost:8050" />
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #343D46 0%, #343D46 100%);
      color: white;
    }
    .container { text-align: center; padding: 2rem; }
    h1 { font-size: 1.75rem; font-weight: 300; margin: 0 0 0.5rem; }
    p { opacity: 0.85; margin: 0.5rem 0; }
    .spinner {
      width: 48px; height: 48px;
      border: 4px solid rgba(255, 255, 255, 0.2);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 1.5rem auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    a { color: #ffd54f; text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="container">
    <div class="spinner"></div>
    <h1>Starting Financial Dashboard</h1>
    <p>Redirecting in a few seconds...</p>
    <p><a href="http://localhost:8050">Open dashboard now</a></p>
  </div>
</body>
</html>
